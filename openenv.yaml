name: "sql-security-investigator"
version: "1.0.0"
description: "AI Agent for SQL-based security forensic analysis and threat neutralization."
entrypoint: "server.app:app"
env_type: "python"
port: 8000

tasks:
  - name: "sql-easy-detect"
    description: "Detect the malicious IP from failed login logs using a basic SELECT."
  - name: "sql-medium-aggregate"
    description: "Identify the top failed IP using aggregation (GROUP BY ip)."
  - name: "sql-hard-block"
    description: "Investigate logs and block the malicious IP via INSERT INTO firewall."

# Metadata for the Leaderboard
evaluation:
  scoring_script: "graders/evaluator.py"
  metrics:
    - "task_easy"
    - "task_medium"
    - "task_hard"
    - "success_rate"
    - "score"
